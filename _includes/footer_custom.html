<script>
  (function () {
    function moveNewPathFooter() {
      var footers = Array.prototype.slice.call(document.querySelectorAll('.np-site-footer, #np-global-footer'));
      if (!footers.length) return;

      var footer = document.getElementById('np-global-footer') || footers[0];
      footer.id = 'np-global-footer';
      footer.classList.add('np-site-footer');
      footer.setAttribute('data-np-footer', 'global');

      footers.forEach(function (item) {
        if (item !== footer && item.parentNode) {
          item.parentNode.removeChild(item);
        }
      });

      if (footer.parentNode !== document.body) {
        document.body.appendChild(footer);
      }

      footer.style.position = 'fixed';
      footer.style.left = '0';
      footer.style.right = '0';
      footer.style.bottom = '0';
      footer.style.width = '100vw';
      footer.style.zIndex = '2147483000';
    }

    function scheduleFooterMove() {
      moveNewPathFooter();
      window.setTimeout(moveNewPathFooter, 50);
      window.setTimeout(moveNewPathFooter, 250);
      window.setTimeout(moveNewPathFooter, 1000);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', scheduleFooterMove);
    } else {
      scheduleFooterMove();
    }

    window.addEventListener('load', scheduleFooterMove);
  })();
</script>
