name: Markdown-Zeitstempel aktualisieren

on:
  push:
    branches:
      - main
    paths:
      - "**.md"
      - ".github/workflows/update-md-timestamps.yml"

permissions:
  contents: write

jobs:
  update-timestamps:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Zeitstempel in Markdown-Dateien aktualisieren
        run: |
          python3 << 'PY'
          from pathlib import Path
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("Europe/Berlin")).strftime("%d.%m.%Y, %H:%M Uhr")

          start = "<!-- AUTO_UPDATED_START -->"
          end = "<!-- AUTO_UPDATED_END -->"

          new_block = f"""{start}
          > **Zuletzt aktualisiert:** {now}
          {end}"""

          for file in Path(".").rglob("*.md"):
              if ".git" in file.parts:
                  continue

              text = file.read_text(encoding="utf-8")

              if start in text and end in text:
                  before = text.split(start)[0]
                  after = text.split(end, 1)[1]
                  updated = before + new_block + after
              else:
                  updated = new_block + "\n\n" + text

              file.write_text(updated, encoding="utf-8")
          PY

      - name: Änderungen committen und pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Keine Änderungen am Zeitstempel notwendig."
          else
            git add .
            git commit -m "Docs: Markdown-Zeitstempel aktualisiert"
            git push
          fi