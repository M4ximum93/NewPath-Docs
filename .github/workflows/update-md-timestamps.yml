name: Update Markdown timestamps

on:
  push:
    branches:
      - main
    paths:
      - "index.md"
      - "regelwerk.md"
      - "philosophie.md"
      - "faq.md"
      - "serverinfos.md"

permissions:
  contents: write

jobs:
  update-timestamps:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Zeitstempel aktualisieren
        run: |
          DATE=$(TZ="Europe/Berlin" date +"%d.%m.%Y %H:%M Uhr")

          FILES="index.md regelwerk.md philosophie.md faq.md serverinfos.md"

          for file in $FILES; do
            if [ -f "$file" ]; then
              if grep -q "<!-- AUTO_UPDATED_START -->" "$file"; then
                sed -i "/<!-- AUTO_UPDATED_START -->/,/<!-- AUTO_UPDATED_END -->/c\\<!-- AUTO_UPDATED_START -->\n<p class=\"np-last-updated\">Zuletzt aktualisiert: $DATE</p>\n<!-- AUTO_UPDATED_END -->" "$file"
              fi
            fi
          done

      - name: Änderungen committen
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Doku: Zeitstempel aktualisiert"
          file_pattern: "index.md regelwerk.md philosophie.md faq.md serverinfos.md"